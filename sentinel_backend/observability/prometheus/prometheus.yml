# Prometheus Configuration for Sentinel Platform
# Enhanced configuration with service discovery, recording rules, and custom metrics

global:
  scrape_interval: 15s       # Default scrape interval
  evaluation_interval: 15s    # Evaluate rules every 15 seconds
  external_labels:
    cluster: 'sentinel'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # Uncomment when alertmanager is configured
          # - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  - 'alerts.yml'
  - 'recording_rules.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          tier: 'observability'

  # API Gateway
  - job_name: 'api_gateway'
    static_configs:
      - targets: ['api_gateway:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    labels:
      service: 'api_gateway'
      tier: 'gateway'
      version: 'v1'

  # Auth Service
  - job_name: 'auth_service'
    static_configs:
      - targets: ['auth_service:8005']
    metrics_path: '/metrics'
    scrape_interval: 10s
    labels:
      service: 'auth_service'
      tier: 'backend'
      version: 'v1'

  # Spec Service
  - job_name: 'spec_service'
    static_configs:
      - targets: ['spec_service:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s
    labels:
      service: 'spec_service'
      tier: 'backend'
      version: 'v1'

  # Orchestration Service
  - job_name: 'orchestration_service'
    static_configs:
      - targets: ['orchestration_service:8002']
    metrics_path: '/metrics'
    scrape_interval: 10s
    labels:
      service: 'orchestration_service'
      tier: 'backend'
      version: 'v1'

  # Execution Service
  - job_name: 'execution_service'
    static_configs:
      - targets: ['execution_service:8003']
    metrics_path: '/metrics'
    scrape_interval: 10s
    labels:
      service: 'execution_service'
      tier: 'backend'
      version: 'v1'

  # Data Service
  - job_name: 'data_service'
    static_configs:
      - targets: ['data_service:8004']
    metrics_path: '/metrics'
    scrape_interval: 10s
    labels:
      service: 'data_service'
      tier: 'backend'
      version: 'v1'

  # Rust Core Service
  - job_name: 'sentinel_rust_core'
    static_configs:
      - targets: ['sentinel_rust_core:8088']
    metrics_path: '/metrics'
    scrape_interval: 10s
    labels:
      service: 'rust_core'
      tier: 'backend'
      version: 'v1'
      language: 'rust'

  # PostgreSQL Database (using postgres_exporter)
  # Uncomment when postgres_exporter is added
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['postgres_exporter:9187']
  #   labels:
  #     service: 'postgresql'
  #     tier: 'database'

  # RabbitMQ Metrics
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['message_broker:15692']
    metrics_path: '/metrics'
    scrape_interval: 15s
    labels:
      service: 'rabbitmq'
      tier: 'messaging'

  # Jaeger Metrics (self-monitoring)
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
    metrics_path: '/metrics'
    scrape_interval: 30s
    labels:
      service: 'jaeger'
      tier: 'observability'
