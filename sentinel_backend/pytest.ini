[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
    --cov=.
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
markers =
    unit: Unit tests
    integration: Integration tests
    functional: Functional tests
    security: Security tests
    performance: Performance tests
    benchmark: Performance benchmark tests (Python vs Rust)
    slow: Slow running tests
    database: Tests that require database
    external: Tests that require external services
    mock: Tests using mocked dependencies
    rust: Tests that require Rust service to be running
    fallback: Tests for fallback mechanisms
    critical: Critical regression tests (Priority 1 - must pass before production)
    high: High priority tests (Priority 2 - run in CI pipeline)
    medium: Medium priority tests (Priority 3 - weekly regression suite)
env_files = 
    config/testing.env
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:asyncio
